# [역할]: AWS 서비스(S3 등) 이용을 위한 핵심 보안 및 지역 설정입니다.
cloud:
  aws:
    credentials:
      # [작동 순서 1]: 내 AWS 계정의 열쇠(Access Key)를 확인합니다.
      access-key: TEMP_SECRET_KEY_123
      # [작동 순서 2]: 비밀 열쇠(Secret Key)로 인증을 완료합니다.
      secret-key: TEMP_SECRET_KEY_123
    region:
      # [역할]: S3 버킷이 생성된 위치인 '서울(ap-northeast-2)'을 지정합니다.
      static: ap-northeast-2
      # [주석]: 자동 리전 감지를 끄고 명시한 '서울'만 바라보게 합니다.
      auto: false
    s3:
      # [역할]: 실제 물고기 사진이 저장될 창고(Bucket)의 이름입니다.
      bucket: coldwater-fish-bucket # 질문자님의 실제 버킷명으로 바꾸세요.

# [역할]: 파일 업로드 시 S3로 보낼 데이터의 최대 크기를 제한합니다.
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB