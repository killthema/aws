version: '3.10'

services:
  # ---------------------------------------------------------
  # [1. 자바 백엔드] 
  # 경로: infra(현재) -> Backend 로 나가기(..) -> Coldwaterfish-project 진입
  # ---------------------------------------------------------
  java-backend:
    build: ../Coldwaterfish-project 
    container_name: fish-java
    ports:
      - "8090:8090"
    env_file:
      - .env  # [체크]: infra 폴더 안에 .env 파일이 있어야 합니다.
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    restart: always

  # ---------------------------------------------------------
  # [2. 파이썬 AI 서버] 
  # 경로: infra(현재) -> Backend 로 나가기(..) -> fish_ai 진입
  # ---------------------------------------------------------
  python-ai:
    build: ../fish_ai
    container_name: fish-ai
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: always

  # ---------------------------------------------------------
  # [3. 리액트 프론트엔드 (Nginx 포함)] 
  # 경로: infra -> Backend(..) -> cold-main(..) -> Front -> Coldwaterfish 진입
  # ---------------------------------------------------------
  react-frontend:
    # [작동 순서]: 두 번 올라가야 전체 루트 폴더(cold-main)에 도착합니다.
    build: ../../frontend/Coldwaterfish 
    container_name: fish-react
    ports:
      - "80:80"
    restart: always